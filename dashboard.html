<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSSD Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 15px; }
        h1 { color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .prihlaska { background: #2a2a2a; padding: 15px; margin: 15px 0; border-radius: 8px; border-left: 5px solid #f1c40f; }
        .details { display: none; margin-top: 15px; padding: 15px; background: #333; border-radius: 5px; line-height: 1.6; }
        
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-view { background: #3498db; color: white; }
        .btn-approve { background: #27ae60; color: white; }
        
        .field { margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        strong { color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h1>Administrační panel LSSD</h1>
    <p>Aktuálně čekající přihlášky:</p>
    
    <div id="seznam-prihlasek">Načítám přihlášky...</div>
    
    <br>
    <a href="/logout" style="color: #e74c3c;">Odhlásit se</a>
</div>

<script>
    async function nacistPrihlasky() {
        try {
            const res = await fetch('/api/admin/applications');
            const apps = await res.json();
            const list = document.getElementById('seznam-prihlasek');
            
            if (apps.length === 0) { list.innerHTML = "<p>Žádné nové přihlášky.</p>"; return; }

            list.innerHTML = apps.map(app => `
                <div class="prihlaska">
                    <p><strong>Discord:</strong> ${app.discordTag} | <strong>IC Jméno:</strong> ${app.icName}</p>
                    <button class="btn-view" onclick="toggleDetails('${app._id}')">Zobrazit celou přihlášku</button>
                    
                    <div id="details-${app._id}" class="details">
                        <div class="field"><strong>Osobní info:</strong> ${app.oocName}, ${app.age} let</div>
                        <div class="field"><strong>Dostupnost:</strong> ${app.availability}</div>
                        <div class="field"><strong>FiveM zkušenosti:</strong> ${app.fivemExp}</div>
                        <div class="field"><strong>Policejní zkušenosti:</strong> ${app.policeExp}</div>
                        <div class="field"><strong>RP Styl:</strong> ${app.rpStyle} | <strong>Oblast:</strong> ${app.area}</div>
                        <div class="field"><strong>Specializace:</strong> ${app.specialization.join(', ')}</div>
                        <div class="field"><strong>Oblíbené scénáře:</strong> ${app.scenarios}</div>
                        <div class="field"><strong>Řešení konfliktů:</strong> ${app.conflicts}</div>
                        <div class="field"><strong>Životopis:</strong> ${app.story}</div>
                        <div class="field"><strong>Motivace:</strong> ${app.motivation}</div>
                        <div class="field"><strong>Dovednosti:</strong> ${app.skills}</div>
                        <div class="field"><strong>Přílohy/Odkazy:</strong> ${app.attachments || 'Žádné'}</div>
                        
                        <button class="btn-approve" onclick="schvalit('${app._id}')">SCHVÁLIT UŽIVATELE</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('seznam-prihlasek').innerHTML = "Chyba při načítání.";
        }
    }

    function toggleDetails(id) {
        const el = document.getElementById('details-' + id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function schvalit(id) {
        const res = await fetch('/api/admin/approve/' + id, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
            alert("Uživatel byl úspěšně schválen!");
            nacistPrihlasky();
        }
    }

    nacistPrihlasky();
</script>

</body>
</html>
