<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSSD Administrace</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        .prihlaska { background: #2a2a2a; padding: 15px; margin: 15px 0; border-left: 4px solid #f1c40f; border-radius: 5px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        h1 { color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h1>Administrační panel LSSD</h1>
    <p>Zde uvidíš seznam hráčů čekajících na schválení:</p>
    
    <div id="seznam-prihlasek">
        <p>Načítám přihlášky...</p>
    </div>
    
    <hr>
    <a href="/logout">Odhlásit se</a>
</div>

<script>
    async function nacistPrihlasky() {
        try {
            const response = await fetch('/api/admin/applications');
            const apps = await response.json();
            const list = document.getElementById('seznam-prihlasek');
            
            if (apps.length === 0) {
                list.innerHTML = "<p>Žádné nové přihlášky.</p>";
                return;
            }

            list.innerHTML = apps.map(app => `
                <div class="prihlaska">
                    <p><strong>Discord:</strong> ${app.discordTag}</p>
                    <p><strong>IC Jméno:</strong> ${app.icName}</p>
                    <p><strong>Věk:</strong> ${app.icAge} | <strong>Zkušenosti:</strong> ${app.fivemExp}</p>
                    <p><strong>Motivace:</strong> ${app.reason}</p>
                    <button onclick="schvalit('${app._id}')">SCHVÁLIT A PŘIJMOUT</button>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('seznam-prihlasek').innerHTML = "Chyba při načítání přihlášek.";
        }
    }

    async function schvalit(id) {
        const res = await fetch('/api/admin/approve/' + id, { method: 'POST' });
        const result = await res.json();
        if (result.success) {
            alert("Uživatel byl schválen!");
            nacistPrihlasky(); // Obnoví seznam
        }
    }

    // Spustit při načtení stránky
    nacistPrihlasky();
</script>

</body>
</html>
