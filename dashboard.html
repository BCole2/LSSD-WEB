<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSSD Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 15px; }
        h1 { color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .prihlaska { background: #2a2a2a; padding: 20px; margin: 20px 0; border-left: 5px solid #f1c40f; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .details { display: none; margin-top: 15px; padding: 15px; background: #333; border-radius: 5px; line-height: 1.6; }
        
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-view { background: #3498db; color: white; }
        .btn-view:hover { background: #2980b9; }
        .btn-approve { background: #27ae60; color: white; width: 100%; margin-top: 20px; font-size: 1.1em; }
        
        .section-title { color: #f1c40f; margin-top: 15px; font-size: 1.1em; border-bottom: 1px solid #444; }
        .field { margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Administrační panel LSSD</h1>
    <p>Aktuálně čekající přihlášky:</p>
    <div id="seznam-prihlasek">Načítám přihlášky...</div>
    <br>
    <a href="/logout" style="color: #e74c3c;">Odhlásit se</a>
</div>

<script>
    async function nacistPrihlasky() {
        const res = await fetch('/api/admin/applications');
        const apps = await res.json();
        const list = document.getElementById('seznam-prihlasek');
        
        if (apps.length === 0) { list.innerHTML = "<p>Žádné nové přihlášky.</p>"; return; }

        list.innerHTML = apps.map(a => `
            <div class="prihlaska">
                <p><strong>Discord:</strong> ${a.discordTag} | <strong>IC Jméno:</strong> ${a.icName}</p>
                <button class="btn-view" onclick="toggleDetails('${a._id}')">Zobrazit celou přihlášku</button>
                
                <div id="details-${a._id}" class="details">
                    <div class="section-title">Osobní informace (OOC)</div>
                    <div class="field"><strong>Jméno:</strong> ${a.oocName} | <strong>Věk:</strong> ${a.age}</div>
                    <div class="field"><strong>Dostupnost:</strong> ${a.availability}</div>
                    
                    <div class="section-title">Herní zkušenosti</div>
                    <div class="field"><strong>FiveM:</strong> ${a.fivemExp} | <strong>Předchozí servery:</strong> ${a.prevServers}</div>
                    <div class="field"><strong>Roleplay zkušenosti:</strong> ${a.rpExp}</div>
                    <div class="field"><strong>Policejní RP:</strong> ${a.policeExp}</div>
                    <div class="field"><strong>Motivace vstupu:</strong> ${a.reason}</div>
                    
                    <div class="section-title">Roleplay pozadí</div>
                    <div class="field"><strong>Styl:</strong> ${a.rpStyle} | <strong>Oblast:</strong> ${a.area}</div>
                    <div class="field"><strong>Specializace:</strong> ${a.specialization.join(', ')}</div>
                    <div class="field"><strong>Oblíbené scénáře:</strong> ${a.scenarios}</div>
                    <div class="field"><strong>Řešení konfliktů:</strong> ${a.conflicts}</div>
                    
                    <div class="section-title">Detaily postavy (IC)</div>
                    <div class="field"><strong>Jméno postavy:</strong> ${a.icName} | <strong>Věk postavy:</strong> ${a.icAge}</div>
                    <div class="field"><strong>Životopis:</strong> ${a.story}</div>
                    <div class="field"><strong>Motivace postavy:</strong> ${a.motivation}</div>
                    <div class="field"><strong>Dovednosti:</strong> ${a.skills}</div>
                    <div class="field"><strong>Přílohy/Odkazy:</strong> ${a.attachments || 'Žádné'}</div>
                    
                    <button class="btn-approve" onclick="schvalit('${a._id}')">SCHVÁLIT UŽIVATELE</button>
                </div>
            </div>
        `).join('');
    }

    function toggleDetails(id) {
        const el = document.getElementById('details-' + id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function schvalit(id) {
        const res = await fetch('/api/admin/approve/' + id, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
            alert("Uživatel byl úspěšně schválen!");
            nacistPrihlasky();
        }
    }

    nacistPrihlasky();
</script>
</body>
</html>
