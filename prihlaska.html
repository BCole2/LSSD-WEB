<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LSSD | Náborový formulář</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; border-top: 5px solid #f1c40f; }
        .step { display: none; }
        .step.active { display: block; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #f1c40f; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: #f1c40f; color: black; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-prev { background: #444; color: white; margin-right: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <form action="/submit-application" method="POST">
        
        <div class="step active" id="step1">
            <h2>1. Osobní informace OOC</h2>
            <label>Křestní jméno *</label>
            <input type="text" name="oocName" required>
            <label>Věk *</label>
            <input type="number" name="age" required>
            <label>Dostupnost (dny a časy) *</label>
            <textarea name="availability" required></textarea>
            <button type="button" onclick="validateAndNext(2)">Další strana</button>
        </div>

        <div class="step" id="step2">
            <h2>2. Herní zkušenosti</h2>
            <label>Zkušenosti s FiveM *</label>
            <select name="fivemExp" required>
                <option value="">-- Vyberte --</option>
                <option value="Začátečník">Začátečník (0-6 měsíců)</option>
                <option value="Pokročilý">Pokročilý (6 měsíců - 2 roky)</option>
                <option value="Zkušený">Zkušený (2+ roky)</option>
            </select>
            <label>Předchozí servery *</label>
            <input type="text" name="prevServers" required>
            <label>Zkušenosti s RP *</label>
            <select name="rpExp" required>
                <option value="">-- Vyberte --</option>
                <option value="Žádné">Žádné</option>
                <option value="Základní">Základní</option>
                <option value="Dobré">Dobré</option>
            </select>
            <label>Zkušenosti s policejním RP *</label>
            <textarea name="policeExp" required></textarea>
            <label>Proč chcete vstoupit do LSSD? *</label>
            <textarea name="reason" required></textarea>
            <button type="button" class="btn-prev" onclick="changeStep(1)">Zpět</button>
            <button type="button" onclick="validateAndNext(3)">Další strana</button>
        </div>

        <div class="step" id="step3">
            <h2>3. Roleplay pozadí</h2>
            <label>Preferovaný styl RP *</label>
            <select name="rpStyle" required>
                <option value="">-- Vyberte --</option>
                <option value="Serious">Serious RP</option>
                <option value="Semi-serious">Semi-serious</option>
                <option value="Casual">Casual</option>
                <option value="Mixed">Smíšený</option>
            </select>
            <label>Preferovaná oblast *</label>
            <select name="area" required>
                <option value="">-- Vyberte --</option>
                <option value="LS">Downtown Los Santos</option>
                <option value="Sandy">Sandy Shores</option>
                <option value="Paleto">Paleto Bay</option>
                <option value="Highway">Dálniční</option>
            </select>
            <label>Specializace (vyberte aspoň jednu) *</label>
            <select name="specialization" required>
                <option value="">-- Vyberte --</option>
                <option value="Dopravní">Dopravní policie</option>
                <option value="Detektiv">Detektivní práce</option>
                <option value="SWAT">SWAT tým</option>
                <option value="K9">K-9 jednotka</option>
            </select>
            <label>Oblíbené RP scénáře *</label>
            <textarea name="scenarios" required></textarea>
            <label>Jak řešíte konflikty v RP? *</label>
            <textarea name="conflicts" required></textarea>
            <button type="button" class="btn-prev" onclick="changeStep(2)">Zpět</button>
            <button type="button" onclick="validateAndNext(4)">Další strana</button>
        </div>

        <div class="step" id="step4">
            <h2>4. Detaily postavy</h2>
            <label>Jméno postavy *</label>
            <input type="text" name="icName" required>
            <label>Věk postavy *</label>
            <input type="number" name="icAge" required>
            <label>Životopis *</label>
            <textarea name="story" required></textarea>
            <label>Motivace *</label>
            <textarea name="motivation" required></textarea>
            <label>Dovednosti *</label>
            <textarea name="skills" required></textarea>
            
            <label>Přílohy (nepovinné)</label>
            <textarea name="attachments" placeholder="Vložte odkazy..."></textarea>
            
            <button type="button" class="btn-prev" onclick="changeStep(3)">Zpět</button>
            <button type="submit">ODESLAT FORMULÁŘ</button>
        </div>
    </form>
</div>

<script>
    function changeStep(s) {
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    function validateAndNext(s) {
        const currentStep = document.querySelector('.step.active');
        const inputs = currentStep.querySelectorAll('[required]');
        let valid = true;
        inputs.forEach(input => {
            if (!input.value) {
                input.style.borderColor = 'red';
                valid = false;
            } else {
                input.style.borderColor = '#444';
            }
        });
        if (valid) changeStep(s);
        else alert("Prosím, vyplňte všechna povinná pole označená hvězdičkou!");
    }
</script>
</body>
</html>
